name: mail-02-runcmd

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runcmd:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: sa-saopaulo-1
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli --quiet
      - name: Probe run-command no mail-ces-amd
        run: |
          set +e
          TEN="$OCI_CLI_TENANCY"
          INST="ocid1.instance.oc1.sa-saopaulo-1.antxeljrrbffr3qcp7tprdlj25zj4c3ec5bqq35qmndx7do477mteb6mmd5a"
          SCRIPT='#!/bin/bash
          echo RUNCMD_OK
          uname -m
          free -m | grep -i mem
          swapon --show || echo no-swap
          docker --version 2>/dev/null || echo NO_DOCKER'
          # monta JSON do content via python para escapar certinho
          CONTENT=$(python3 -c "import json,sys; print(json.dumps({'source':{'sourceType':'TEXT','text':open('/tmp/s.sh').read()},'output':{'outputType':'TEXT'}}))" 2>/dev/null)
          echo "$SCRIPT" > /tmp/s.sh
          CONTENT=$(python3 -c "import json; print(json.dumps({'source':{'sourceType':'TEXT','text':open('/tmp/s.sh').read()},'output':{'outputType':'TEXT'}}))")
          TARGET="{\"instanceId\":\"$INST\"}"
          CMD=$(oci instance-agent command create --compartment-id "$TEN" --execution-time-out-in-seconds 120 --target "$TARGET" --content "$CONTENT" --display-name ces-probe --query 'data.id' --raw-output 2>&1)
          echo "CREATE: $CMD"
          if ! echo "$CMD" | grep -qE "^ocid1\.instanceagentcommand"; then
            echo "RESULT=RUNCMD_INDISPONIVEL"
            exit 0
          fi
          for i in $(seq 1 20); do
            ST=$(oci instance-agent command-execution get --instance-agent-command-id "$CMD" --instance-id "$INST" --query 'data."delivery-state"' --raw-output 2>/dev/null)
            LF=$(oci instance-agent command-execution get --instance-agent-command-id "$CMD" --instance-id "$INST" --query 'data."lifecycle-state"' --raw-output 2>/dev/null)
            echo "  delivery=$ST lifecycle=$LF"
            if [ "$LF" = "SUCCEEDED" ] || [ "$LF" = "FAILED" ]; then
              echo "=== OUTPUT DA VM ==="
              oci instance-agent command-execution get --instance-agent-command-id "$CMD" --instance-id "$INST" --query 'data.content.output.text' --raw-output 2>/dev/null
              echo "RESULT=RUNCMD_OK"
              break
            fi
            sleep 8
          done
