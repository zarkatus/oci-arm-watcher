name: mail-install2
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 32
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: sa-saopaulo-1
    steps:
      - run: pip install oci-cli --quiet
      - name: Estado do comando antigo + (re)instalar com flag correta
        run: |
          set +e
          TEN="$OCI_CLI_TENANCY"
          INST="ocid1.instance.oc1.sa-saopaulo-1.antxeljrrbffr3qcp7tprdlj25zj4c3ec5bqq35qmndx7do477mteb6mmd5a"
          OLD="ocid1.instanceagentcommand.oc1.sa-saopaulo-1.amaaaaaarbffr3qaqgb5yg3meyyepvrt3mjtdmrx7hjs7rmfow2eapstuzza"
          echo "===== estado do comando ANTIGO (flag correta) ====="
          oci instance-agent command-execution get --command-id "$OLD" --instance-id "$INST" --query 'data."lifecycle-state"' --raw-output 2>&1
          OST=$(oci instance-agent command-execution get --command-id "$OLD" --instance-id "$INST" --query 'data."lifecycle-state"' --raw-output 2>/dev/null)
          if [ "$OST" = "SUCCEEDED" ]; then
            echo "===== INSTALL ANTIGO JÁ CONCLUIU — output: ====="
            oci instance-agent command-execution get --command-id "$OLD" --instance-id "$INST" --query 'data.content.output.text' --raw-output 2>/dev/null | tail -70
            exit 0
          fi
          echo "antigo=$OST — criando NOVO comando de install"
          cat > /tmp/cmd.sh <<'EOS'
          #!/bin/bash
          curl -fsSL https://raw.githubusercontent.com/zarkatus/oci-arm-watcher/main/install-mail.sh -o /tmp/im.sh
          bash /tmp/im.sh
          EOS
          CONTENT=$(python3 -c "import json;print(json.dumps({'source':{'sourceType':'TEXT','text':open('/tmp/cmd.sh').read()},'output':{'outputType':'TEXT'}}))")
          CMD=$(oci instance-agent command create --compartment-id "$TEN" --timeout-in-seconds 1500 --target "{\"instanceId\":\"$INST\"}" --content "$CONTENT" --display-name ces-install-mail2 --query 'data.id' --raw-output 2>&1)
          echo "NOVO CMD=$CMD"
          echo "$CMD" | grep -qE "^ocid1\.instanceagentcommand" || { echo "falha create"; exit 1; }
          for i in $(seq 1 90); do
            S=$(oci instance-agent command-execution get --command-id "$CMD" --instance-id "$INST" --query 'data."lifecycle-state"' --raw-output 2>/dev/null)
            echo "[$i] state=$S"
            if [ "$S" = "SUCCEEDED" ] || [ "$S" = "FAILED" ] || [ "$S" = "TIMED_OUT" ]; then
              echo "===== OUTPUT ====="
              oci instance-agent command-execution get --command-id "$CMD" --instance-id "$INST" --query 'data.content.output.text' --raw-output 2>/dev/null | tail -80
              echo "===== exit ====="
              oci instance-agent command-execution get --command-id "$CMD" --instance-id "$INST" --query 'data.content."exit-code"' --raw-output 2>/dev/null
              break
            fi
            sleep 16
          done
